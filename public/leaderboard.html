<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard - AI Jailbreak Arena</title>
  <link rel="stylesheet" href="leaderboard-style.css">
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<div class="leaderboard-container">
  <h1 class="glow-title">🏆 LEADERBOARD 🏆</h1>
  
  <div class="leaderboard-card">
    <div class="leaderboard-header">
      <div>RANK</div>
      <div>TEAM</div>
      <div>ATTEMPTS USED</div>
      <div>TAKEN TIME</div>
    </div>
    
    <div id="leaderboardBody" class="leaderboard-body">
      <!-- Leaderboard entries will be loaded here -->
      <div class="loading">Loading leaderboard...</div>
    </div>
  </div>
  
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">Total Winners</div>
      <div class="stat-value" id="totalWinners">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Average Attempts</div>
      <div class="stat-value" id="avgAttempts">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Last Winner</div>
      <div class="stat-value" id="lastWinner">-</div>
    </div>
  </div>
  
  <div class="button-group">
    <button onclick="refreshLeaderboard()" class="refresh-btn">⟳ REFRESH</button>
    <button onclick="goBack()" class="back-btn">← BACK TO GAME</button>
  </div>
</div>

<script src="leaderboard.js"></script>
</body>
</html>
